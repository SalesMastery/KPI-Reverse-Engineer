<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rep Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #0f0f0f; --border: #1c1c1c; --muted: #2a2a2a;
    --text: #e8e8e8; --sub: #555; --amber: #F0A500; --green: #22C55E;
    --red: #EF4444; --blue: #4A9EFF; --purple: #A855F7;
  }
  body { background: var(--bg); color: var(--text); font-family: monospace; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--muted); }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input::placeholder { color: #333; }

  /* HEADER */
  #header { border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #header .sub-label { font-size: 9px; color: var(--sub); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 2px; }
  #header .title { font-family: 'Bebas Neue', cursive; font-size: 20px; letter-spacing: .04em; }
  #header .title span { color: var(--amber); }
  #header-btns { display: flex; gap: 8px; align-items: center; }
  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* TABS */
  #tabs { border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 4px; flex-shrink: 0; }
  .tab { background: none; border: none; cursor: pointer; font-family: monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; padding: 11px 16px; color: var(--sub); border-bottom: 2px solid transparent; transition: all .15s; }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* CONTENT */
  #content { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* BUTTONS */
  .vb { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 6px 14px; cursor: pointer; font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--sub); transition: all .15s; }
  .vb:hover { border-color: var(--muted); color: var(--text); }
  .vb.act { border-color: var(--amber); color: var(--amber); background: #F0A50010; }
  .sb { background: none; border: 1px solid var(--border); border-radius: 3px; padding: 4px 10px; cursor: pointer; font-family: monospace; font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--sub); transition: all .12s; }
  .sb:hover { border-color: var(--muted); }
  .sb.act { border-color: var(--amber); color: var(--amber); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--sub); font-size: 13px; padding: 2px 6px; border-radius: 3px; transition: color .15s; }
  .del-btn:hover { color: var(--red); }
  .edit-btn { background: none; border: none; cursor: pointer; color: var(--sub); font-size: 11px; padding: 2px 6px; border-radius: 3px; transition: color .15s; font-family: monospace; }
  .edit-btn:hover { color: var(--amber); }

  /* SECTION HEADER */
  .section-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .section-bar { width: 2px; height: 14px; border-radius: 1px; }
  .section-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .14em; }
  .sort-btns { display: flex; gap: 4px; }

  /* PODIUM */
  .podium { display: flex; gap: 10px; margin-bottom: 14px; }
  .podium-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px 14px; position: relative; }
  .podium-rank { position: absolute; top: 10px; right: 12px; font-size: 10px; font-family: 'Bebas Neue', cursive; letter-spacing: .1em; }
  .podium-role { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 2px; }
  .podium-name { font-size: 18px; font-family: 'Bebas Neue', cursive; color: var(--text); margin-bottom: 6px; padding-right: 32px; }
  .podium-val  { font-size: 28px; font-family: 'Bebas Neue', cursive; line-height: 1; margin-bottom: 8px; }
  .podium-stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat-badge { text-align: center; }
  .stat-badge .s-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 2px; }
  .stat-badge .s-val   { font-size: 15px; font-family: 'Bebas Neue', cursive; }
  .empty-slot { flex: 1; background: var(--surface); border: 1px dashed var(--muted); border-radius: 6px; display: flex; align-items: center; justify-content: center; min-height: 120px; font-size: 10px; color: var(--muted); }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .trow { display: grid; padding: 10px 14px; border-bottom: 1px solid var(--border); align-items: center; }
  .trow.thead { padding: 8px 14px; }
  .trow.thead span { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; }
  .trow.tbody:hover { background: var(--surface); filter: brightness(1.3); }
  .cell-rank  { font-size: 11px; font-family: 'Bebas Neue', cursive; }
  .cell-name  { font-size: 13px; font-family: 'Bebas Neue', cursive; color: var(--text); }
  .cell-num   { font-size: 13px; font-family: 'Bebas Neue', cursive; text-align: center; }
  .cell-rate  { font-size: 13px; font-family: 'Bebas Neue', cursive; text-align: center; }
  .cell-acts  { display: flex; gap: 2px; justify-content: flex-end; }
  .closer-grid { grid-template-columns: 28px 160px repeat(6,1fr) 100px 100px 60px; }
  .setter-grid { grid-template-columns: 28px 160px repeat(5,1fr) 90px 90px 90px 60px; }

  /* EDIT PANEL */
  #edit-panel { border-radius: 6px; padding: 20px; margin-bottom: 20px; }
  #edit-panel .ep-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  #edit-panel .ep-role { font-size: 10px; text-transform: uppercase; letter-spacing: .15em; }
  #edit-panel .ep-name-wrap { margin-bottom: 16px; }
  #edit-panel .ep-name-wrap label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; display: block; margin-bottom: 5px; }
  #edit-panel .ep-name-input { background: transparent; border: 1px solid var(--muted); border-radius: 4px; color: var(--text); font-family: 'Bebas Neue', cursive; font-size: 18px; padding: 6px 12px; outline: none; width: 240px; }
  #edit-panel .ep-fields { display: grid; gap: 12px; margin-bottom: 16px; }
  #edit-panel .ep-field label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; display: block; margin-bottom: 5px; text-align: center; }
  #edit-panel .ep-field input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--muted); color: var(--text); font-family: 'Bebas Neue', cursive; font-size: 16px; text-align: center; padding: 3px 0; outline: none; }
  #edit-panel .ep-preview { display: flex; gap: 12px; padding: 10px 12px; background: var(--bg); border-radius: 4px; margin-bottom: 14px; }
  #edit-panel .ep-preview .s-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; display: block; }
  #edit-panel .ep-preview .s-val   { font-size: 14px; font-family: 'Bebas Neue', cursive; }
  #edit-panel .ep-actions { display: flex; gap: 8px; }
  #edit-panel .save-btn { border: none; border-radius: 4px; padding: 8px 20px; font-family: monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; cursor: pointer; font-weight: 700; color: #000; }
  #edit-panel .del-rep-btn { background: none; border: 1px solid #EF444440; border-radius: 4px; padding: 8px 14px; color: var(--red); font-family: monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; cursor: pointer; margin-left: auto; }

  /* EMPTY STATE */
  #empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
  #empty-state .es-title { font-size: 36px; font-family: 'Bebas Neue', cursive; color: var(--muted); margin-bottom: 8px; }
  #empty-state .es-sub   { font-size: 11px; margin-bottom: 20px; }
  #empty-state .es-btns  { display: flex; gap: 10px; justify-content: center; }

  /* FOOTER */
  #footer { border-top: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 32px; flex-shrink: 0; align-items: center; }
  #footer .f-item .f-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; margin-right: 10px; }
  #footer .f-item .f-val   { font-size: 16px; font-family: 'Bebas Neue', cursive; }
  #footer .f-period { margin-left: auto; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <div class="sub-label">Sales Mastery</div>
    <div class="title">REP <span>LEADERBOARD</span></div>
  </div>
  <div id="header-btns">
    <button class="vb act" onclick="setPeriod('Monthly')">Monthly</button>
    <button class="vb"     onclick="setPeriod('Weekly')">Weekly</button>
    <button class="vb"     onclick="setPeriod('Daily')">Daily</button>
    <div class="divider"></div>
    <button class="vb" style="color:var(--green);border-color:#22C55E40" onclick="startNew('closer')">+ Closer</button>
    <button class="vb" style="color:var(--blue);border-color:#4A9EFF40"  onclick="startNew('setter')">+ Setter</button>
  </div>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab active" data-view="closers" onclick="setView('closers')">Closers (<span id="cnt-closers">0</span>)</button>
  <button class="tab"        data-view="setters" onclick="setView('setters')">Setters (<span id="cnt-setters">0</span>)</button>
  <button class="tab"        data-view="all"     onclick="setView('all')">All Reps (<span id="cnt-all">0</span>)</button>
</div>

<!-- CONTENT -->
<div id="content"></div>

<!-- FOOTER -->
<div id="footer" style="display:none">
  <div class="f-item">
    <span class="f-label">Team Revenue</span>
    <span class="f-val" id="f-revenue" style="color:var(--amber)">—</span>
  </div>
  <div class="f-item">
    <span class="f-label">Total Closes</span>
    <span class="f-val" id="f-closes" style="color:var(--green)">—</span>
  </div>
  <div class="f-item">
    <span class="f-label">Total Booked</span>
    <span class="f-val" id="f-booked" style="color:var(--blue)">—</span>
  </div>
  <div class="f-item">
    <span class="f-label">Total Dials</span>
    <span class="f-val" id="f-dials" style="color:var(--blue)">—</span>
  </div>
  <div class="f-item f-period">
    <span class="f-label">Period</span>
    <span class="f-val" id="f-period" style="color:var(--sub)">Monthly</span>
  </div>
</div>

<script>
// ── Config — paste your Apps Script URL here ──────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLrXGArEU19d9ibz-XX52RdoSLmsGXZtwOzZiov4_i__RX4SfVe3ewGvaeOLYw0A/exec';

// ── State ─────────────────────────────────────────────────────────────────────
let reps       = [];
let view       = 'closers';
let period     = 'Monthly';
let sortCloser = 'revenue';
let sortSetter = 'booked';
let editing    = null;   // null | 'new' | rep.id
let editBuf    = null;

// ── Constants ─────────────────────────────────────────────────────────────────
const RANK_COLORS  = ['#F0A500','#9CA3AF','#CD7F32'];
const RANK_LABELS  = ['1ST','2ND','3RD'];

const CLOSER_FIELDS = [
  { key:'taken',     label:'Calls Taken',  color:'var(--green)' },
  { key:'noshows',   label:'No Shows',     color:'var(--red)'   },
  { key:'offers',    label:'Offers',       color:'var(--green)' },
  { key:'followups', label:'Follow Ups',   color:'#6BCB8E'      },
  { key:'closes',    label:'Closes',       color:'var(--amber)' },
  { key:'revenue',   label:'Cash Collected', color:'var(--amber)', isMoney:true },
];
const SETTER_FIELDS = [
  { key:'dials',     label:'Dials',        color:'var(--blue)'  },
  { key:'pickups',   label:'Pick Ups',     color:'var(--blue)'  },
  { key:'proposed',  label:'Proposed',     color:'var(--blue)'  },
  { key:'followups', label:'Follow Ups',   color:'#7AB8FF'      },
  { key:'booked',    label:'Calls Booked', color:'var(--amber)' },
];

// ── Formatters ────────────────────────────────────────────────────────────────
const fmt  = n => (n == null || !isFinite(n)) ? '—' : Math.round(n).toLocaleString();
const $    = n => (n == null || !isFinite(n)) ? '—' : '$' + Math.round(n).toLocaleString();
const pct  = n => (n == null || !isFinite(n)) ? '—' : (n*100).toFixed(0) + '%';

// ── Computed stats ────────────────────────────────────────────────────────────
function setterStats(r) {
  return {
    pickupRate:  r.dials    ? r.pickups  / r.dials    : 0,
    pitchRate:   r.pickups  ? r.proposed / r.pickups  : 0,
    bookingRate: r.proposed ? r.booked   / r.proposed : 0,
  };
}
function closerStats(r) {
  return {
    showRate:  r.taken  ? r.taken  / (r.taken + (r.noshows||0)) : 0,
    offerRate: r.taken  ? r.offers / r.taken   : 0,
    closeRate: r.offers ? r.closes / r.offers  : 0,
    acv:       r.closes ? r.revenue/ r.closes  : 0,
  };
}

// ── Persistence ───────────────────────────────────────────────────────────────
async function loadReps() {
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px;color:var(--sub);font-family:\'Bebas Neue\',cursive;font-size:20px;letter-spacing:.1em">LOADING...</div>';
  try {
    const res  = await fetch(SCRIPT_URL, { redirect: 'follow' });
    const text = await res.text();
    const data = JSON.parse(text);
    reps = Array.isArray(data) ? data : [];
  } catch(e) {
    console.error('Load failed:', e);
    reps = [];
  }
  render();
}

async function saveReps() {
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(reps),
    });
  } catch(e) {
    console.error('Save failed:', e);
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
function setPeriod(p) { period = p; render(); }
function setView(v)   { view = v; render(); }

function startNew(role) {
  editBuf = role === 'closer'
    ? { id: Date.now(), name:'', role:'closer', taken:0, noshows:0, offers:0, followups:0, closes:0, revenue:0 }
    : { id: Date.now(), name:'', role:'setter', dials:0, pickups:0, proposed:0, followups:0, booked:0 };
  editing = 'new';
  render();
}
function startEdit(id) {
  editBuf = { ...reps.find(r => r.id === id) };
  editing = id;
  render();
}
function cancelEdit() { editing = null; editBuf = null; render(); }
function deleteRep(id) {
  reps = reps.filter(r => r.id !== id);
  saveReps();
  if (editing === id) { editing = null; editBuf = null; }
  render();
}
function saveEdit() {
  if (!editBuf.name.trim()) return;
  if (editing === 'new') {
    reps.push({ ...editBuf, id: Date.now() });
  } else {
    reps = reps.map(r => r.id === editing ? { ...editBuf } : r);
  }
  saveReps();
  editing = null; editBuf = null;
  render();
}
function setField(k, v) {
  if (!editBuf) return;
  editBuf[k] = v;
  // live-update the preview
  updatePreview();
}

// ── Sorting ───────────────────────────────────────────────────────────────────
function sorted(list, key) { return [...list].sort((a,b) => (b[key]||0) - (a[key]||0)); }

// ── HTML builders ─────────────────────────────────────────────────────────────
function podiumCard(rep, rank, sortKey, isMoney) {
  const rankColor = RANK_COLORS[rank] || '#555';
  const mainVal   = isMoney ? $(rep[sortKey]) : fmt(rep[sortKey]);
  const isCloser  = rep.role === 'closer';
  let statsHtml = '';
  if (isCloser) {
    const st = closerStats(rep);
    statsHtml = [
      { l:'Close%', v:pct(st.closeRate), c:'var(--amber)' },
      { l:'ACV',    v:$(st.acv),         c:'var(--green)' },
      { l:'Offers', v:fmt(rep.offers),   c:'var(--green)' },
    ].map(s => `<div class="stat-badge"><div class="s-label">${s.l}</div><div class="s-val" style="color:${s.c}">${s.v}</div></div>`).join('');
  } else {
    const st = setterStats(rep);
    statsHtml = [
      { l:'Book%',    v:pct(st.bookingRate), c:'var(--amber)' },
      { l:'Pick-Up%', v:pct(st.pickupRate),  c:'var(--blue)'  },
      { l:'Dials',    v:fmt(rep.dials),      c:'var(--blue)'  },
    ].map(s => `<div class="stat-badge"><div class="s-label">${s.l}</div><div class="s-val" style="color:${s.c}">${s.v}</div></div>`).join('');
  }
  return `
    <div class="podium-card" style="border-top:3px solid ${rankColor}">
      <div class="podium-rank" style="color:${rankColor}">${RANK_LABELS[rank] || '#'+(rank+1)}</div>
      <div class="podium-role">${rep.role}</div>
      <div class="podium-name">${rep.name || '—'}</div>
      <div class="podium-val" style="color:${rankColor}">${mainVal}</div>
      <div class="podium-stats">${statsHtml}</div>
    </div>`;
}

function closerTableRow(rep, i) {
  const st = closerStats(rep);
  const rankColor = i < 3 ? RANK_COLORS[i] : '#555';
  const cells = CLOSER_FIELDS.map(f =>
    `<span class="cell-num" style="color:${sortCloser===f.key?f.color:'var(--text)'}">${f.isMoney?$(rep[f.key]):fmt(rep[f.key])}</span>`
  ).join('');
  return `
    <div class="trow tbody closer-grid" style="background:${i===0?'#F0A50005':'transparent'}">
      <span class="cell-rank" style="color:${rankColor}">${i<3?RANK_LABELS[i]:'#'+(i+1)}</span>
      <span class="cell-name">${rep.name}</span>
      ${cells}
      <span class="cell-rate" style="color:var(--amber)">${pct(st.closeRate)}</span>
      <span class="cell-rate" style="color:var(--green)">${$(st.acv)}</span>
      <div class="cell-acts">
        <button class="edit-btn" onclick="startEdit(${rep.id})">✎</button>
        <button class="del-btn"  onclick="deleteRep(${rep.id})">✕</button>
      </div>
    </div>`;
}

function setterTableRow(rep, i) {
  const st = setterStats(rep);
  const rankColor = i < 3 ? RANK_COLORS[i] : '#555';
  const cells = SETTER_FIELDS.map(f =>
    `<span class="cell-num" style="color:${sortSetter===f.key?f.color:'var(--text)'}">${fmt(rep[f.key])}</span>`
  ).join('');
  return `
    <div class="trow tbody setter-grid" style="background:${i===0?'#F0A50005':'transparent'}">
      <span class="cell-rank" style="color:${rankColor}">${i<3?RANK_LABELS[i]:'#'+(i+1)}</span>
      <span class="cell-name">${rep.name}</span>
      ${cells}
      <span class="cell-rate" style="color:var(--blue)">${pct(st.pickupRate)}</span>
      <span class="cell-rate" style="color:var(--blue)">${pct(st.pitchRate)}</span>
      <span class="cell-rate" style="color:var(--amber)">${pct(st.bookingRate)}</span>
      <div class="cell-acts">
        <button class="edit-btn" onclick="startEdit(${rep.id})">✎</button>
        <button class="del-btn"  onclick="deleteRep(${rep.id})">✕</button>
      </div>
    </div>`;
}

function editPanel() {
  if (!editBuf) return '';
  const isCloser  = editBuf.role === 'closer';
  const color     = isCloser ? 'var(--green)' : 'var(--blue)';
  const fields    = isCloser ? CLOSER_FIELDS : SETTER_FIELDS;
  const cols      = fields.length;
  const fieldHtml = fields.map(f => `
    <div class="ep-field">
      <label style="color:${f.color}">${f.label}</label>
      <input type="number" min="0" placeholder="0" value="${editBuf[f.key]||''}"
        oninput="setField('${f.key}', Number(this.value)||0)" />
    </div>`).join('');

  const previewHtml = buildPreviewHtml(editBuf);

  return `
    <div id="edit-panel" style="background:var(--surface);border:1px solid ${isCloser?'#22C55E':'#4A9EFF'}40;border-left:3px solid ${color}">
      <div class="ep-hdr">
        <span class="ep-role" style="color:${color}">${editing==='new'?'New':'Edit'} ${editBuf.role}</span>
        <button class="del-btn" onclick="cancelEdit()">✕</button>
      </div>
      <div class="ep-name-wrap">
        <label>Rep Name</label>
        <input class="ep-name-input" type="text" placeholder="Enter name..." value="${editBuf.name}"
          oninput="editBuf.name=this.value" />
      </div>
      <div class="ep-fields" style="grid-template-columns:repeat(${cols},1fr)">${fieldHtml}</div>
      <div class="ep-preview" id="ep-preview">${previewHtml}</div>
      <div class="ep-actions">
        <button class="save-btn" style="background:${color}" onclick="saveEdit()">Save Rep</button>
        <button class="vb" onclick="cancelEdit()">Cancel</button>
        ${editing !== 'new' ? `<button class="del-rep-btn" onclick="deleteRep(${editBuf.id});cancelEdit()">Delete Rep</button>` : ''}
      </div>
    </div>`;
}

function buildPreviewHtml(buf) {
  if (!buf) return '';
  if (buf.role === 'closer') {
    const st = closerStats(buf);
    return [
      { l:'Show Rate',  v:pct(st.showRate),  c:'var(--green)' },
      { l:'Offer Rate', v:pct(st.offerRate), c:'var(--green)' },
      { l:'Close Rate', v:pct(st.closeRate), c:'var(--amber)' },
      { l:'ACV',        v:$(st.acv),         c:'var(--amber)' },
    ].map(s => `<div><span class="s-label">${s.l}</span><span class="s-val" style="color:${s.c}">${s.v}</span></div>`).join('');
  } else {
    const st = setterStats(buf);
    return [
      { l:'Pick-Up Rate', v:pct(st.pickupRate),  c:'var(--blue)'  },
      { l:'Pitch Rate',   v:pct(st.pitchRate),   c:'var(--blue)'  },
      { l:'Booking Rate', v:pct(st.bookingRate), c:'var(--amber)' },
    ].map(s => `<div><span class="s-label">${s.l}</span><span class="s-val" style="color:${s.c}">${s.v}</span></div>`).join('');
  }
}

function updatePreview() {
  const el = document.getElementById('ep-preview');
  if (el && editBuf) el.innerHTML = buildPreviewHtml(editBuf);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const closers = reps.filter(r => r.role === 'closer');
  const setters = reps.filter(r => r.role === 'setter');
  const sc = sorted(closers, sortCloser);
  const ss = sorted(setters, sortSetter);

  // counts
  document.getElementById('cnt-closers').textContent = closers.length;
  document.getElementById('cnt-setters').textContent = setters.length;
  document.getElementById('cnt-all').textContent     = reps.length;

  // period buttons
  document.querySelectorAll('#header-btns .vb').forEach(btn => {
    btn.classList.toggle('act', btn.textContent === period);
  });

  // tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });

  // footer
  const footer = document.getElementById('footer');
  footer.style.display = reps.length ? 'flex' : 'none';
  if (reps.length) {
    document.getElementById('f-revenue').textContent = $(closers.reduce((a,r)=>a+(r.revenue||0),0));
    document.getElementById('f-closes').textContent  = fmt(closers.reduce((a,r)=>a+(r.closes||0),0));
    document.getElementById('f-booked').textContent  = fmt(setters.reduce((a,r)=>a+(r.booked||0),0));
    document.getElementById('f-dials').textContent   = fmt(setters.reduce((a,r)=>a+(r.dials||0),0));
    document.getElementById('f-period').textContent  = period;
  }

  // content
  let html = '';

  // edit panel (always on top)
  if (editing) html += editPanel();

  // empty state
  if (reps.length === 0 && !editing) {
    html += `
      <div id="empty-state">
        <div class="es-title">NO REPS YET</div>
        <div class="es-sub">Add your first closer or setter to get started</div>
        <div class="es-btns">
          <button class="vb" style="color:var(--green);border-color:#22C55E50;padding:8px 20px;font-size:11px" onclick="startNew('closer')">+ Add Closer</button>
          <button class="vb" style="color:var(--blue);border-color:#4A9EFF50;padding:8px 20px;font-size:11px" onclick="startNew('setter')">+ Add Setter</button>
        </div>
      </div>`;
  }

  // ── Closers section ──
  if ((view === 'closers' || view === 'all') && closers.length > 0) {
    // sort buttons
    const sortBtns = CLOSER_FIELDS.map(f =>
      `<button class="sb${sortCloser===f.key?' act':''}" onclick="sortCloser='${f.key}';render()">${f.label}</button>`
    ).join('');

    // podium
    let podium = sc.slice(0,3).map((r,i) => podiumCard(r, i, sortCloser, CLOSER_FIELDS.find(f=>f.key===sortCloser)?.isMoney)).join('');
    for (let i = sc.length; i < 3; i++) podium += '<div class="empty-slot">Empty slot</div>';

    // table header
    const thCells = ['#','Name',...CLOSER_FIELDS.map(f=>f.label),'Close%','ACV',''].map((h,i) =>
      `<span style="text-align:${i>1?'center':'left'}">${h}</span>`).join('');

    html += `
      <div style="margin-bottom:32px">
        <div class="section-hdr">
          <div class="section-bar" style="background:var(--green)"></div>
          <span class="section-label">Closers — ${period} — Ranked by</span>
          <div class="sort-btns">${sortBtns}</div>
        </div>
        <div class="podium">${podium}</div>
        <div class="table-wrap">
          <div class="trow thead closer-grid">${thCells}</div>
          ${sc.map((r,i) => closerTableRow(r,i)).join('')}
        </div>
      </div>`;
  }

  // ── Setters section ──
  if ((view === 'setters' || view === 'all') && setters.length > 0) {
    const sortBtns = SETTER_FIELDS.map(f =>
      `<button class="sb${sortSetter===f.key?' act':''}" onclick="sortSetter='${f.key}';render()">${f.label}</button>`
    ).join('');

    let podium = ss.slice(0,3).map((r,i) => podiumCard(r, i, sortSetter, false)).join('');
    for (let i = ss.length; i < 3; i++) podium += '<div class="empty-slot">Empty slot</div>';

    const thCells = ['#','Name',...SETTER_FIELDS.map(f=>f.label),'Pick-Up%','Pitch%','Book%',''].map((h,i) =>
      `<span style="text-align:${i>1?'center':'left'}">${h}</span>`).join('');

    html += `
      <div style="margin-bottom:32px">
        <div class="section-hdr">
          <div class="section-bar" style="background:var(--blue)"></div>
          <span class="section-label">Setters — ${period} — Ranked by</span>
          <div class="sort-btns">${sortBtns}</div>
        </div>
        <div class="podium">${podium}</div>
        <div class="table-wrap">
          <div class="trow thead setter-grid">${thCells}</div>
          ${ss.map((r,i) => setterTableRow(r,i)).join('')}
        </div>
      </div>`;
  }

  // empty view state (reps exist but none in this tab)
  if (!editing && reps.length > 0) {
    if (view === 'closers' && closers.length === 0) {
      html += `<div style="text-align:center;padding:40px;color:var(--sub)">
        <div style="font-size:28px;font-family:'Bebas Neue',cursive;color:var(--muted);margin-bottom:8px">NO CLOSERS YET</div>
        <button class="vb" style="color:var(--green)" onclick="startNew('closer')">+ Add Closer</button></div>`;
    } else if (view === 'setters' && setters.length === 0) {
      html += `<div style="text-align:center;padding:40px;color:var(--sub)">
        <div style="font-size:28px;font-family:'Bebas Neue',cursive;color:var(--muted);margin-bottom:8px">NO SETTERS YET</div>
        <button class="vb" style="color:var(--blue)" onclick="startNew('setter')">+ Add Setter</button></div>`;
    }
  }

  document.getElementById('content').innerHTML = html;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadReps();
</script>
</body>
</html>
